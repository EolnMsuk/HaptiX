name: Build iOS Tweak

on:
  push:
    branches:
      - main 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 📚 Download iOS SDKs
        run: |
          # This pulls every older SDK (including 14.5) straight into Theos
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: 🏗️ Compile Tweak
        run: |
          make package FINALPACKAGE=1

      - name: 📦 Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaptiX-Rootless-Deb
          path: packages/*.deb
