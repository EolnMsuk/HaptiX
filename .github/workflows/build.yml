name: Build iOS Tweak

on:
  push:
    branches:
      - main 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Install Dependencies
        run: |
          brew install ldid dos2unix

      - name: 🛠️ Setup Official Theos
        run: |
          # Back to the standard, stable Theos build system
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 📚 Download iOS SDKs
        run: |
          rm -rf $HOME/theos/sdks
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: 🏗️ Compile Tweak
        run: |
          dos2unix control
          make package FINALPACKAGE=1

      - name: 📦 Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaptiX-Rootless-Deb
          path: packages/*.deb
