name: Build iOS Tweak

on:
  push:
    branches:
      - main 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Install Dependencies
        run: |
          brew install ldid dos2unix

      - name: 🛠️ Setup RootHide Theos
        run: |
          # We are now cloning the official RootHide fork of Theos!
          git clone --recursive https://github.com/RootHide/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 📚 Download iOS SDKs
        run: |
          rm -rf $HOME/theos/sdks
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: 🏗️ Compile Tweak
        run: |
          # Convert the control file to Unix line endings
          dos2unix control
          
          # Build the package
          make package FINALPACKAGE=1

      - name: 📦 Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaptiX-RootHide-Deb
          path: packages/*.deb
